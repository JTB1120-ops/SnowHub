<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snowy Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=IM+Fell+English:ital@0,1&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #f5c842;
      --glass: rgba(10, 15, 30, 0.55);
      --glass-border: rgba(255,255,255,0.08);
      --accent: #7eb8f7;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Raleway', sans-serif;
      background: #000;
      color: #fff;
    }

    .bg {
      position: fixed; inset: 0;
      background-image: url('edited-photo.png');
      background-size: cover;
      background-position: center bottom;
      z-index: 0;
    }
    .bg::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, transparent 20%, rgba(0,0,10,0.55) 100%);
    }

    #snow { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

    .page { position: fixed; inset: 0; z-index: 2; display: none; flex-direction: column; align-items: center; }
    .page.active { display: flex; }

    /* NAV */
    .nav {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      z-index: 10; display: flex; flex-direction: row; gap: 20px;
      align-items: center;
    }
    .nav-btn {
      background: rgba(10,15,30,0.65); border: 1px solid var(--glass-border);
      color: rgba(255,255,255,0.7);
      font-family: 'Cinzel Decorative', cursive; font-size: 1rem;
      letter-spacing: 0.14em; cursor: pointer;
      width: 200px; padding: 22px 0;
      border-radius: 60px; transition: all 0.25s;
      backdrop-filter: blur(14px);
    }
    .nav-btn:hover { color: #fff; background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); transform: scale(1.05); }
    .nav-btn.active { background: rgba(245,200,66,0.15); color: var(--gold); border-color: rgba(245,200,66,0.4); }

    /* HOME */
    .title-block {
      position: absolute; top: 7vh; left: 50%; transform: translateX(-50%);
      text-align: center; pointer-events: none; animation: fadeDown 1.5s ease forwards;
    }
    .title-block h1 {
      font-family: 'Cinzel Decorative', cursive;
      font-size: clamp(1.4rem, 3.5vw, 3rem); letter-spacing: 0.18em; color: var(--gold);
      text-shadow: 0 0 20px rgba(245,180,30,0.9), 0 0 60px rgba(200,130,10,0.5), 0 2px 4px rgba(0,0,0,0.9);
      white-space: nowrap;
    }
    .characters {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      animation: sway 5s ease-in-out infinite; transform-origin: bottom center;
      z-index: 1; pointer-events: none;
    }
    .characters img {
      height: 88vh; max-height: 860px; width: auto; display: block;
      filter: drop-shadow(0 0 40px rgba(255,160,80,0.25)) drop-shadow(0 0 80px rgba(80,140,255,0.15));
    }
    @keyframes sway {
      0%   { transform: translateX(-50%) rotate(-1.2deg); }
      50%  { transform: translateX(-50%) rotate(1.2deg);  }
      100% { transform: translateX(-50%) rotate(-1.2deg); }
    }
    @keyframes fadeDown {
      from { opacity:0; transform: translateX(-50%) translateY(-12px); }
      to   { opacity:1; transform: translateX(-50%) translateY(0); }
    }

    /* INNER PAGES */
    .inner-page {
      width: 100%; height: 100%; display: flex; flex-direction: column;
      padding: 28px 32px 100px; overflow: hidden;
    }
    .page-header {
      display: flex; align-items: center; gap: 16px; margin-bottom: 24px; flex-shrink: 0;
    }
    .back-btn {
      background: var(--glass); border: 1px solid var(--glass-border);
      color: rgba(255,255,255,0.6); font-family: 'Raleway', sans-serif;
      font-size: 0.8rem; font-weight: 600; letter-spacing: 0.1em;
      padding: 8px 16px; border-radius: 30px; cursor: pointer;
      backdrop-filter: blur(10px); transition: all 0.2s;
      display: flex; align-items: center; gap: 6px;
    }
    .back-btn:hover { color: #fff; border-color: rgba(255,255,255,0.2); }
    .page-title {
      font-family: 'Cinzel Decorative', cursive;
      font-size: clamp(1.1rem, 2.5vw, 1.8rem); color: var(--gold);
      text-shadow: 0 0 20px rgba(245,180,30,0.6); letter-spacing: 0.12em;
    }
    .search-bar {
      display: flex; align-items: center; background: var(--glass);
      border: 1px solid var(--glass-border); border-radius: 30px;
      padding: 8px 16px; backdrop-filter: blur(10px); gap: 8px;
      margin-left: auto; width: clamp(180px, 28%, 320px);
    }
    .search-bar input {
      background: none; border: none; outline: none; color: #fff;
      font-family: 'Raleway', sans-serif; font-size: 0.85rem; width: 100%;
    }
    .search-bar input::placeholder { color: rgba(255,255,255,0.3); }
    .search-bar svg { flex-shrink: 0; opacity: 0.4; }

    .scroll-area {
      flex: 1; overflow-y: auto; overflow-x: hidden; padding-right: 6px;
    }
    .scroll-area::-webkit-scrollbar { width: 4px; }
    .scroll-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

    /* SOUNDBOARD */
    .sound-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; padding: 4px 2px;
    }
    .sound-card {
      background: var(--glass); border: 1px solid var(--glass-border); border-radius: 14px;
      backdrop-filter: blur(12px); padding: 20px 14px; text-align: center;
      cursor: pointer; transition: all 0.2s; user-select: none;
    }
    .sound-card:hover { border-color: rgba(245,200,66,0.35); background: rgba(245,200,66,0.08); transform: translateY(-2px); }
    .sound-card.playing { border-color: var(--gold); background: rgba(245,200,66,0.15); }
    .sound-card .icon { font-size: 2rem; margin-bottom: 10px; display: block; }
    .sound-card .label { font-size: 0.78rem; font-weight: 600; letter-spacing: 0.08em; color: rgba(255,255,255,0.75); text-transform: uppercase; }
    .sound-card.playing .label { color: var(--gold); }

    /* AI */
    .chat-wrap { display: flex; flex-direction: column; height: 100%; gap: 16px; }
    .chat-messages {
      flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding-right: 6px;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
    .msg { max-width: 72%; padding: 12px 16px; border-radius: 16px; font-size: 0.9rem; line-height: 1.55; backdrop-filter: blur(10px); }
    .msg.user {
      align-self: flex-end; background: rgba(126,184,247,0.18);
      border: 1px solid rgba(126,184,247,0.25); border-bottom-right-radius: 4px;
    }
    .msg.ai {
      align-self: flex-start; background: var(--glass);
      border: 1px solid var(--glass-border); border-bottom-left-radius: 4px; color: rgba(255,255,255,0.85);
    }
    .msg.ai .ai-label { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.12em; color: var(--gold); text-transform: uppercase; margin-bottom: 5px; }
    .typing-dot { display: inline-block; width: 6px; height: 6px; background: rgba(255,255,255,0.5); border-radius: 50%; margin: 0 2px; animation: blink 1.2s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }
    .chat-input-row { display: flex; gap: 10px; flex-shrink: 0; }
    .chat-input {
      flex: 1; background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: 30px; padding: 12px 20px; color: #fff;
      font-family: 'Raleway', sans-serif; font-size: 0.88rem; outline: none;
      backdrop-filter: blur(10px); transition: border-color 0.2s;
    }
    .chat-input:focus { border-color: rgba(245,200,66,0.4); }
    .chat-input::placeholder { color: rgba(255,255,255,0.3); }
    .send-btn {
      background: rgba(245,200,66,0.18); border: 1px solid rgba(245,200,66,0.35);
      border-radius: 50%; width: 46px; height: 46px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s; color: var(--gold); flex-shrink: 0;
    }
    .send-btn:hover { background: rgba(245,200,66,0.3); }

    /* GAMES */
    .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; padding: 4px 2px; }
    .game-card {
      background: var(--glass); border: 1px solid var(--glass-border); border-radius: 16px;
      backdrop-filter: blur(12px); padding: 28px 20px; text-align: center;
      cursor: pointer; transition: all 0.25s; position: relative; overflow: hidden;
    }
    .game-card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.03), transparent); border-radius: inherit; }
    .game-card:hover { transform: translateY(-4px); border-color: rgba(126,184,247,0.4); background: rgba(126,184,247,0.08); }
    .game-card .game-icon { font-size: 2.8rem; margin-bottom: 12px; display: block; }
    .game-card .game-name { font-size: 0.9rem; font-weight: 700; letter-spacing: 0.06em; color: #fff; margin-bottom: 6px; }
    .game-card .game-desc { font-size: 0.72rem; color: rgba(255,255,255,0.4); letter-spacing: 0.04em; }
    .game-card .game-tag { display: inline-block; margin-top: 12px; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); border: 1px solid rgba(126,184,247,0.3); border-radius: 20px; padding: 3px 10px; }

    .no-results { text-align: center; color: rgba(255,255,255,0.25); font-size: 0.85rem; padding: 40px 0; letter-spacing: 0.08em; }
  </style>
</head>
<body>

  <div class="bg"></div>
  <canvas id="snow"></canvas>

  <!-- CHARACTERS — always visible -->
  <div class="characters">
    <img src="t&n.png" alt="Tanjiro and Nezuko" />
  </div>

  <!-- HOME -->
  <div class="page active" id="page-home">
    <div class="title-block"><h1>Snowy Hub</h1></div>
  </div>

  <!-- SOUNDBOARD -->
  <div class="page" id="page-sound">
    <div class="inner-page">
      <div class="page-header">
        <button class="back-btn" onclick="goHome()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
          Back
        </button>
        <span class="page-title">Soundboard</span>
        <div class="search-bar">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="sound-search" placeholder="Search sounds…" oninput="filterSounds()" />
        </div>
      </div>
      <div class="scroll-area">
        <div class="sound-grid" id="sound-grid"></div>
        <div class="no-results" id="sound-noresult" style="display:none">No sounds found.</div>
      </div>
    </div>
  </div>

  <!-- AI -->
  <div class="page" id="page-ai">
    <div class="inner-page">
      <div class="page-header">
        <button class="back-btn" onclick="goHome()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
          Back
        </button>
        <span class="page-title">AI Chat</span>
      </div>
      <div class="chat-wrap">
        <div class="chat-messages" id="chat-messages">
          <div class="msg ai">
            <div class="ai-label">✦ Snowy AI</div>
            Hey. Ask me anything — I'm here.
          </div>
        </div>
        <div class="chat-input-row">
          <input class="chat-input" id="chat-input" type="text" placeholder="Type a message…" onkeydown="if(event.key==='Enter') sendMsg()" />
          <button class="send-btn" onclick="sendMsg()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2 11 13M22 2 15 22l-4-9-9-4 20-7z"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- GAMES -->
  <div class="page" id="page-games">
    <div class="inner-page">
      <div class="page-header">
        <button class="back-btn" onclick="goHome()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
          Back
        </button>
        <span class="page-title">Games</span>
        <div class="search-bar">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="game-search" placeholder="Search games…" oninput="filterGames()" />
        </div>
      </div>
      <div class="scroll-area">
        <div class="games-grid" id="games-grid"></div>
        <div class="no-results" id="game-noresult" style="display:none">No games found.</div>
      </div>
    </div>
  </div>

  <!-- NAV -->
  <nav class="nav">
    <button class="nav-btn" id="nav-sound" onclick="showPage('sound')">Soundboard</button>
    <button class="nav-btn" id="nav-ai"    onclick="showPage('ai')">AI</button>
    <button class="nav-btn" id="nav-games" onclick="showPage('games')">Games</button>
  </nav>

  <!-- GAME OVERLAY -->
  <div id="game-overlay" style="display:none; position:fixed; inset:0; z-index:100; background:rgba(0,0,0,0.95); flex-direction:column;">
    <div style="display:flex; align-items:center; gap:12px; padding:12px 20px; flex-shrink:0; border-bottom:1px solid rgba(255,255,255,0.08);">
      <button onclick="closeGame()" style="background:rgba(10,15,30,0.8); border:1px solid rgba(255,255,255,0.1); color:rgba(255,255,255,0.7); font-family:Raleway,sans-serif; font-size:0.8rem; font-weight:600; padding:8px 16px; border-radius:30px; cursor:pointer; display:flex; align-items:center; gap:6px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        Back
      </button>
      <span id="game-overlay-title" style="font-family:'Cinzel Decorative',cursive; color:#f5c842; font-size:1rem; letter-spacing:0.1em;"></span>
    </div>
    <iframe id="game-iframe" src="" style="flex:1; width:100%; border:none;" allowfullscreen></iframe>
  </div>

  <script>
    // SNOW
    const canvas = document.getElementById('snow');
    const ctx = canvas.getContext('2d');
    let W, H, flakes = [];
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', () => { resize(); initSnow(); });
    function rand(a,b) { return a + Math.random()*(b-a); }
    function mkFlake() {
      return { x:rand(0,W), y:rand(-H,0), r:rand(2,9), speed:rand(0.6,2.2),
               drift:rand(-0.4,0.4), alpha:rand(0.25,0.65), blur:rand(0,3),
               wobble:rand(0,Math.PI*2), wobbleSpeed:rand(0.005,0.02) };
    }
    function initSnow() { flakes = Array.from({length:Math.max(80,Math.floor(W*H/9000))}, mkFlake); }
    initSnow();
    (function drawSnow() {
      ctx.clearRect(0,0,W,H);
      for (const f of flakes) {
        f.wobble += f.wobbleSpeed;
        f.x += f.drift + Math.sin(f.wobble)*0.4;
        f.y += f.speed;
        if (f.y > H+10) { f.y=-10; f.x=rand(0,W); }
        if (f.x < -10) f.x = W+10;
        if (f.x > W+10) f.x = -10;
        ctx.save();
        ctx.shadowBlur = f.blur*4;
        ctx.shadowColor = `rgba(255,255,255,${f.alpha})`;
        ctx.globalAlpha = f.alpha;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(f.x, f.y, f.r, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
      }
      requestAnimationFrame(drawSnow);
    })();

    // NAV
    function showPage(name) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('page-'+name).classList.add('active');
      const navBtn = document.getElementById('nav-'+name);
      if (navBtn) navBtn.classList.add('active');
      // hide nav when on subpage
      document.querySelector('.nav').style.display = name === 'home' ? 'flex' : 'none';
    }
    function goHome() {
      showPage('home');
      document.querySelector('.nav').style.display = 'flex';
    }

    // SOUNDBOARD
    const SOUNDS = [
      { label:'Tiki Tiki',    icon:'🎵', file:'sounds/TIKITIKI.mp3' },
      { label:'Get Out',      icon:'😤', file:'sounds/tuco-get-out.mp3' },
      { label:'Vine Boom',    icon:'💥', file:'sounds/vine-boom.mp3' },
      { label:'What The Hell',icon:'😱', file:'sounds/wth.mp3' },
    ];

    let activeAudio = null, activeCard = null;

    function playSound(s, card) {
      if (activeAudio) { activeAudio.pause(); activeAudio.currentTime = 0; activeAudio = null; }
      if (activeCard) { activeCard.classList.remove('playing'); }
      if (activeCard === card) { activeCard = null; return; }

      activeCard = card;
      card.classList.add('playing');

      const audio = new Audio(s.file);
      audio.play().catch(e => {
        console.error('Failed to play:', s.file, e);
        card.classList.remove('playing');
        activeCard = null;
      });
      activeAudio = audio;
      audio.onended = () => { card.classList.remove('playing'); if (activeCard === card) activeCard = null; };
    }

    function renderSounds(list) {
      const grid = document.getElementById('sound-grid');
      const nr   = document.getElementById('sound-noresult');
      grid.innerHTML = '';
      if (!list.length) { nr.style.display='block'; return; }
      nr.style.display = 'none';
      list.forEach(s => {
        const card = document.createElement('div');
        card.className = 'sound-card';
        card.innerHTML = `<span class="icon">${s.icon}</span><span class="label">${s.label}</span>`;
        card.onclick = () => playSound(s, card);
        grid.appendChild(card);
      });
    }
    renderSounds(SOUNDS);

    function filterSounds() {
      const q = document.getElementById('sound-search').value.toLowerCase();
      renderSounds(SOUNDS.filter(s => s.label.toLowerCase().includes(q)));
    }

    // GAMES
    const GAMES = [
      { name:'Brotato',              desc:'Top-down arena shooter roguelite.', url:'games/418.html', image:'https://cdn.cloudflare.steamstatic.com/steam/apps/1942280/header.jpg' },
      { name:'Cloverpit',            desc:'Dark gambling rogue-lite. Beat the slot machine and escape the pit.', url:'games/342.html', image:'https://upload.wikimedia.org/wikipedia/en/thumb/c/c3/CloverPit_cover.jpeg/250px-CloverPit_cover.jpeg' },
      { name:'Balatro',              desc:'Build insane poker hands with special Joker cards.', url:'games/268.html', image:'https://cdn.cloudflare.steamstatic.com/steam/apps/2379780/header.jpg' },
      { name:'Plants Vs Zombies 2',  desc:'Defend your lawn against fun-loving zombies across time.', url:'games/92.html', image:'https://img.utdstc.com/icon/889/533/8895331dfa5d196b0447dae5849a66c663080e5931a36e3909586fae09d5d238:200' },
      { name:'Scribblenauts',        desc:'Solve puzzles by summoning objects you write.', url:'games/102.html', image:'https://m.media-amazon.com/images/I/71nlFl--0jL._AC_UF1000,1000_QL80_.jpg' },
      { name:'Sprunki',              desc:'Incredibox but with little furry creatures.', url:'games/101.html', image:'https://imgs.crazygames.com/games/sprunki-itn/cover_16x9-1732009692724.png?metadata=none&quality=60&height=6378' },
      { name:"Zelda: Majora's Mask", desc:'3 days to stop the moon from crashing.', url:'games/90.html', image:'https://media.gamestop.com/i/gamestop/10118726/The-Legend-of-Zelda-Majoras-Mask---Nintendo-3DS?w=768&h=768&fmt=auto' },
      { name:'Minecraft 1.12.1',     desc:'World of Color update. Build anything.', url:'games/164.html', image:'https://image.api.playstation.com/vulcan/ap/rnd/202407/0401/670c294ded3baf4fa11068db2ec6758c63f7daeb266a35a1.png' },
      { name:'GTA Vice City',        desc:'80s crime saga in a neon-soaked city.', url:'games/149.html', image:'https://cdn.cloudflare.steamstatic.com/steam/apps/12110/header.jpg' },
      { name:'Retro Bowl',           desc:'Football management game.', url:'games/191.html', image:'https://www.thisdaddylife.com/wp-content/uploads/2020/05/Retro-Bowl-Avatar-600px.png' },
      { name:'FNAF',                 desc:'Original horror survival.', url:'games/166.html', image:'https://cdn.cloudflare.steamstatic.com/steam/apps/319510/header.jpg' },
      { name:'FNAF 2',               desc:'Sequel horror survival.', url:'games/167.html', image:'https://cdn.cloudflare.steamstatic.com/steam/apps/332800/header.jpg' },
      { name:'FNAF 3',               desc:'Third installment horror.', url:'games/168.html', image:'https://cdn.cloudflare.steamstatic.com/steam/apps/354140/header.jpg' },
      { name:'FNAF 4',               desc:'Nightmare horror survival.', url:'games/169.html', image:'https://cdn.cloudflare.steamstatic.com/steam/apps/388090/header.jpg' },
      { name:'Bloons TD 4',          desc:'Tower defense strategy.', url:'games/188.html', image:'https://imgs.crazygames.com/auto-covers/bloons-tower-defense-4-expansion_1x1.png?format=auto&quality=70&metadata=none' },

    function openGame(g) {
      const overlay = document.getElementById('game-overlay');
      const iframe  = document.getElementById('game-iframe');
      const title   = document.getElementById('game-overlay-title');
      // unload grid and hide everything
      document.getElementById('games-grid').innerHTML = '';
      document.querySelector('.nav').style.display = 'none';
      document.querySelector('.characters').style.display = 'none';
      document.querySelector('.bg').style.display = 'none';
      document.getElementById('snow').style.display = 'none';
      iframe.src = g.url;
      title.textContent = g.name;
      overlay.style.display = 'flex';
    }

    function closeGame() {
      const overlay = document.getElementById('game-overlay');
      const iframe  = document.getElementById('game-iframe');
      iframe.src = '';
      overlay.style.display = 'none';
      // restore everything
      document.querySelector('.nav').style.display = 'flex';
      document.querySelector('.characters').style.display = 'block';
      document.querySelector('.bg').style.display = 'block';
      document.getElementById('snow').style.display = 'block';
      renderGames(GAMES);
    }

    function renderGames(list) {
      const grid = document.getElementById('games-grid');
      const nr   = document.getElementById('game-noresult');
      grid.innerHTML = '';
      if (!list.length) { nr.style.display='block'; return; }
      nr.style.display = 'none';
      list.forEach(g => {
        const card = document.createElement('div');
        card.className = 'game-card';
        const imgHTML = g.image
          ? `<img src="${g.image}" alt="${g.name}" style="width:100%;height:110px;object-fit:cover;border-radius:8px;margin-bottom:10px;" onerror="this.style.display='none'">`
          : `<span class="game-icon">🎮</span>`;
        card.innerHTML = `${imgHTML}<div class="game-name">${g.name}</div><div class="game-desc">${g.desc}</div>`;
        card.onclick = () => openGame(g);
        grid.appendChild(card);
      });
    }
    renderGames(GAMES);

    function filterGames() {
      const q = document.getElementById('game-search').value.toLowerCase();
      renderGames(GAMES.filter(g => g.name.toLowerCase().includes(q) || g.desc.toLowerCase().includes(q)));
    }

    const chatHistory = [];

    async function sendMsg() {
      const input = document.getElementById('chat-input');
      const text  = input.value.trim();
      if (!text) return;
      input.value = '';

      const msgs = document.getElementById('chat-messages');

      const userBubble = document.createElement('div');
      userBubble.className = 'msg user';
      userBubble.textContent = text;
      msgs.appendChild(userBubble);
      chatHistory.push({ role:'user', content: text });

      const typingBubble = document.createElement('div');
      typingBubble.className = 'msg ai';
      typingBubble.innerHTML = `<div class="ai-label">✦ Snowy AI</div><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>`;
      msgs.appendChild(typingBubble);
      msgs.scrollTop = msgs.scrollHeight;

      try {
        await new Promise(r => setTimeout(r, 500));
        const reply = 'No.';
        chatHistory.push({ role:'assistant', content: reply });
        typingBubble.innerHTML = `<div class="ai-label">✦ Snowy AI</div>${reply}`;
      } catch(e) {
        typingBubble.innerHTML = `<div class="ai-label">✦ Snowy AI</div>No.`;
      }

      msgs.scrollTop = msgs.scrollHeight;
    }
